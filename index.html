<!DOCTYPE html>
<html>
<body style="font-family:sans-serif;text-align:center;padding:50px">
<h2 id="msg">Connexion Gmail en cours...</h2>
<script>
var params = new URLSearchParams(window.location.hash.substring(1));
var token = params.get('access_token');
if (token) {
  if (window.opener) window.opener.postMessage({gmailToken: token}, '*');
  document.getElementById('msg').innerHTML = '&#10003; Gmail connecte ! Fermeture...';
  setTimeout(function(){ window.close(); }, 1500);
} else {
  document.getElementById('msg').innerHTML = 'Erreur - pas de token.';
}
</script>
</body>
</html>
